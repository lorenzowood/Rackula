<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" xmlns:bx="https://boxy-svg.com">
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#191A21"/>
      <stop offset="0.5" stop-color="#21222C"/>
      <stop offset="1" stop-color="#282A36"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.35"/>
    </radialGradient>
    <filter id="logo-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0.74 0 0 0 0&#10;                0 0.58 0 0 0&#10;                0 0 0.98 0 0&#10;                0 0 0 0.35 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="base-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
    <pattern id="rack-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <line x1="0" y1="40" x2="40" y2="40" stroke="#343746" stroke-width="0.5" opacity="0.4"/>
      <line x1="40" y1="0" x2="40" y2="40" stroke="#343746" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#BD93F9" stop-opacity="0"/>
      <stop offset="0.1" stop-color="#BD93F9"/>
      <stop offset="0.3" stop-color="#FF79C6"/>
      <stop offset="0.5" stop-color="#8BE9FD"/>
      <stop offset="0.7" stop-color="#50FA7B"/>
      <stop offset="0.9" stop-color="#FFB86C"/>
      <stop offset="1" stop-color="#FFB86C" stop-opacity="0"/>
    </linearGradient>
    <bx:export>
      <bx:file format="png" path="og-image.png"/>
    </bx:export>
  </defs>
  <rect width="1280" height="640" fill="url(#bg-gradient)"/>
  <rect width="1280" height="640" fill="url(#rack-grid)" opacity="0.5"/>
  <rect width="1280" height="640" fill="url(#vignette)"/>
  <circle cx="60" cy="480" r="3.5" fill="none" stroke="#44475A" stroke-width="1" opacity="0.7"/>
